<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Checklist Generator</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        textarea { width: 100%; padding: 10px; font-family: inherit; }
        button { padding: 10px 20px; background-color: #0078d4; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #005a9e; }
        #output { background: #f3f2f1; padding: 20px; white-space: pre-wrap; border-radius: 4px; border: 1px solid #edebe9; }
    </style>
</head>
<body>

<h1>Grant Checklist Generator</h1>

<p>Paste your grant guidelines below to generate an organized checklist.</p>
<textarea id="inputText" rows="10" placeholder="Paste your grant text here..."></textarea>
<br><br>

<button onclick="generateChecklist()">Generate Checklist</button>

<h2>Checklist:</h2>
<div id="output">Your checklist will appear here...</div>

<script>
async function generateChecklist() {
    const input = document.getElementById("inputText").value;
    const outputDiv = document.getElementById("output");

    if (!input.trim()) {
        alert("Please paste some grant text first!");
        return;
    }

    outputDiv.innerText = "Analyzing grant guidelines and generating checklist...";

    try {
        // NOTE: Replace the string below with your actual OpenAI API key for local testing.
        // REMEMBER: Do not publish this file online with your key visible!
        const API_KEY = "YOUR_OPENAI_API_KEY_HERE"; 

        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "gpt-4o", // Updated to a valid model name
                messages: [
                    {
                        role: "user",
                        content: `You are a research administrator.

Convert this grant into a checklist of tasks organized into:
- Narrative
- Budget
- Administrative
- Supporting Documents
- Compliance

Grant text:
${input}`
                    }
                ]
            })
        });

        const data = await response.json();

        if (response.ok) {
            outputDiv.innerText = data.choices[0].message.content;
        } else {
            outputDiv.innerText = `API Error: ${data.error ? data.error.message : 'Unknown error'}`;
        }

    } catch (error) {
        console.error("Error:", error);
        outputDiv.innerText = "An error occurred while connecting to the API. Check the console for details.";
    }
}
</script>

</body>
</html>
