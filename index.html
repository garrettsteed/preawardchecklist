<!DOCTYPE html>
<html>
<head>
  <title>Grant Checklist Generator</title>
</head>
<body>

<h1>Grant Checklist Generator</h1>

<textarea id="inputText" rows="10" cols="80" placeholder="Paste your grant text here..."></textarea>
<br><br>

<button onclick="generateChecklist()">Generate Checklist</button>

<h2>Checklist:</h2>
<pre id="output"></pre>

<script>
async function generateChecklist() {
    const input = document.getElementById("inputText").value;

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer AQ.Ab8RN6JSYS73ukrj8w7KKZGMfQWDzLYs0AdyTQHItH-omdco9g"
        },
        body: JSON.stringify({
            model: "gpt-5",
            messages: [
                {
                    role: "user",
                    content: `You are a research administrator.

Convert this grant into a checklist of tasks organized into:
Narrative, Budget, Administrative, Supporting Documents, Compliance.

Grant text:
${input}`
                }
            ]
        })
    });

    const data = await response.json();
    document.getElementById("output").innerText =
        data.choices[0].message.content;
}
</script>

</body>
</html>
